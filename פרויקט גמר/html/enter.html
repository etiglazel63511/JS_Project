<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות | Enter</title>
    <script defer src="../js/enter.js"></script>
    <link rel="stylesheet" href="../css/enter.css">
</head>

<body dir="rtl">
    <div class="background-animation">
        <div class="circle" style="width: 250px; height: 250px; top: 5%; left: 40%;"></div>
        <div class="circle" style="width: 150px; height: 150px; top: 20%; left: 10%;"></div>
        <div class="circle" style="width: 200px; height: 200px; top: 70%; left: 80%;"></div>
        <div class="circle" style="width: 100px; height: 100px; top: 50%; left: 30%;"></div>
        <div class="circle" style="width: 180px; height: 180px; top: 10%; left: 60%;"></div>
        <div class="circle" style="width: 120px; height: 120px; top: 80%; left: 50%;"></div>
    </div>
    <div class="form-container">
        <h1>התחברות</h1>
        <form>
            <input id="name" type="text" placeholder="הכנס שם משתמש">
            <input id="password" type="password" placeholder="הכנס סיסמא">
            <button>התחבר</button>
        </form>
    </div>
</body>

</html>
