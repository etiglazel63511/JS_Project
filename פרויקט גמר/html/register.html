<!DOCTYPE html><!DOCTYPE html><!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה | Register</title>
    <link rel="stylesheet" href="../css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script defer src="../js/register.js"></script>
</head>

<body dir="rtl">
    <div class="background-animation">
        <div class="circle" style="width: 250px; height: 250px; top: 5%; left: 40%;"></div>
        <div class="circle" style="width: 150px; height: 150px; top: 20%; left: 10%;"></div>
        <div class="circle" style="width: 200px; height: 200px; top: 70%; left: 80%;"></div>
        <div class="circle" style="width: 100px; height: 100px; top: 50%; left: 30%;"></div>
        <div class="circle" style="width: 180px; height: 180px; top: 10%; left: 60%;"></div>
        <div class="circle" style="width: 120px; height: 120px; top: 80%; left: 50%;"></div>
    </div>
    <div class="form-container">
        <h1>הרשמה</h1>
        <form>
            <input id="newName" type="text" placeholder="הכנס שם משתמש">
            <input id="newPassword" type="password" placeholder="הכנס סיסמא">
            <input id="realPassword" type="password" placeholder="אימות סיסמא">
            <button type="submit">הרשם</button>
        </form>
        <h3>משתמש קיים? <a href="enter.html">הכנס כאן</a></h3>
    </div>
</body>

</html>
